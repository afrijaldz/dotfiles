# ==============================
# TMUX CONFIG — afrijaldz/dotfiles
# ==============================

# Terminal
set -g default-terminal "screen-256color"

# Prefix: Ctrl+A
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Split pane (intuitive)
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Resize pane (repeatable)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize / zoom pane toggle
bind -r m resize-pane -Z

# Mouse support
set -g mouse on

# Vi-style copy mode
set-window-option -g mode-keys vi

# Copy mode: select & yank
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "clip.exe"

# Disable mouse drag in copy mode
unbind -T copy-mode-vi MouseDragEnd1Pane

# ==============================
# Pane navigation: Ctrl+hjkl (no prefix!)
# Smart vim-tmux-navigator pattern
# ==============================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Ctrl+\ to toggle last pane
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\\\\\'  'select-pane -l'"

# ==============================
# TPM — Tmux Plugin Manager
# ==============================
set -g @tpm_plugins ' \
  jimeh/tmux-themepack \
  tmux-plugins/tmux-resurrect \
  tmux-plugins/tmux-continuum \
'

set -g @themepack 'powerline/default/cyan'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
